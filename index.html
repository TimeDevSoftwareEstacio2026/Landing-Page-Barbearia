<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbería XYZ</title>
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Barbería XYZ</h1>
      <!-- Menu de navegaçãó (opcional) -->
    </header>

    <!-- Seção da tabela de preços -->
    <section id="precos">
      <h2>Nossos Serviços</h2>
      <!-- Tabela com serviços e preços -->
    </section>

    <!-- secção de Horarios -->
    <section id="horarios">
      <h2>Horários de Funcionamento</h2>
      <!-- Pode ser em lista ou tabela -->
    </section>

    <!-- Seção de localização -->
    <section id="localizacao">
      <h2>Nossa localização</h2>
      <div class="mapa">
        <!-- Modificar tamanho com css -->
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14630.427260318984!2d-46.47269538306284!3d-23.546640070533822!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce5e622db57c4f%3A0x3de99bb691d3dc68!2sShopping%20Metr%C3%B4%20Itaquera!5e0!3m2!1ses!2sbr!4v1777134346001!5m2!1ses!2sbr"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </section>

    <!-- Seção visual -->
    <section id="visual">
      <h2>Galeria</h2>
      <!-- Imagens ou depoimentos -->
    </section>

    <!-- Footer -->
    <footer>
      <p>Contacto: contato@barberiaxyz.com</p>
    </footer>
  </body>
</html>
